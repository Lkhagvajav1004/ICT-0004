<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProGear Hub</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<header>

    <div class="top-header">

        <h1 class="logo">ProGear Hub</h1>

        <form class="search-container" action="/search" method="GET">
            <input type="text"
                   class="search-input"
                   placeholder="Search Products..."
                   name="q"
                   required>

            <button type="submit" class="search-btn">
                <img src="10629681.png"
                     alt="Search"
                     class="search-icon">
            </button>
        </form>

        <div class="user-menu">

            <a href="account.html" class="icon-item">
                <i class="fa-regular fa-user"></i>
                <span>My Account</span>
            </a>

            <a href="joinus.html" class="icon-item">
                <i class="fa-solid fa-user-plus"></i>
                <span>Join Us</span>
            </a>

            <a href="help.html" class="icon-item">
                <i class="fa-regular fa-circle-question"></i>
                <span>Help</span>
            </a>

            <a href="cart.html" class="cart-btn">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-count">0</span>
                <span>Cart</span>
            </a>

        </div>

    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="orders.html">Orders</a>
        <a href="about.html">About Us</a>
        <a href="blog.html">Blog</a>
        <a href="contact.html">Contact</a>
    </nav>

</header>

<section class="hero">
    <h2>Featured Sports Products</h2>
    <p>Seasonal sales and new arrivals</p>
</section>

<footer>
    <p>© 2026 ProGear Hub</p>
</footer>

</body>
</html>
